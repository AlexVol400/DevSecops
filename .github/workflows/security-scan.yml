name: Security Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ============================================
  # GITLEAKS - Scans ALL file types for secrets
  # ============================================
  gitleaks:
    name: Gitleaks - Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Gitleaks version: $VERSION"
          wget https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${VERSION}_linux_x64.tar.gz

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR detected - scanning changed commits only"
            ./gitleaks detect --source . \
              --no-git \
              --config .gitleaks.toml \
              --report-format sarif \
              --report-path gitleaks-results.sarif \
              --exit-code 1 2>&1 | tee gitleaks-output.txt || true
          else
            echo "Full branch scan"
            ./gitleaks detect --source . \
              --no-git \
              --config .gitleaks.toml \
              --report-format sarif \
              --report-path gitleaks-results.sarif \
              --exit-code 0 2>&1 | tee gitleaks-output.txt
          fi

          if grep -q "leaks found" gitleaks-output.txt; then
            LEAKS=$(grep "leaks found:" gitleaks-output.txt | awk '{print $NF}')
            echo "GITLEAKS_FINDINGS=$LEAKS" >> $GITHUB_ENV
            echo "Gitleaks found $LEAKS secret(s)!"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "::error::Secrets detected in PR - blocking merge!"
              exit 1
            else
              echo "::warning::Gitleaks found $LEAKS secret(s)! Check Security dashboard."
            fi
          else
            echo "GITLEAKS_FINDINGS=0" >> $GITHUB_ENV
            echo "No secrets found by Gitleaks"
          fi

      - name: Upload Gitleaks SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

  # ============================================
  # CODEQL - Scans Python code
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================
  # DEPENDENCY SCANNING
  # ============================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ============================================
  # PIPELINE SUMMARY
  # ============================================
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, codeql, dependency-review]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "=========================================="
          echo "       SECURITY SCAN SUMMARY"
          echo "=========================================="
          echo "Branch:     ${{ github.ref_name }}"
          echo "Commit:     ${{ github.sha }}"
          echo "Triggered:  ${{ github.event_name }}"
          echo "------------------------------------------"
          echo "Gitleaks:          ${{ needs.gitleaks.result }}"
          echo "CodeQL:            ${{ needs.codeql.result }}"
          echo "Dependency Review: ${{ needs.dependency-review.result }}"
          echo "------------------------------------------"
          echo "Security Dashboard:"
          echo "https://github.com/${{ github.repository }}/security"
          echo "=========================================="
