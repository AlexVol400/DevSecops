[extend]
useDefault = true

[allowlist]
description = "Global allowlist"

[[rules]]
description = "Scan all file types including txt and md"
id = "extended-scan"
regex = '''(?i)(key|secret|password|token|api_key|access_key|private_key|credentials)[\s]*[=:]\s*['"]?([a-zA-Z0-9+/]{20,})['"]?'''
fileRegex = '''\.(txt|md|env|config|cfg|ini|json|yaml|yml|xml|properties)$'''
tags = ["key", "secret"]
